function parseZerodhaCSV(t){var l=t.trim().split('\n');if(l.length<2)return[];var hi=-1;for(var i=0;i<Math.min(40,l.length);i++){var ll=l[i].toLowerCase();if((/symbol|instrument|stock/i.test(ll))&&(/qty|quantity/i.test(ll)||/average|avg/i.test(ll))){hi=i;break}}if(hi===-1)return[];var hd=l[hi].split(',').map(function(h){return h.trim().toLowerCase().replace(/['"]/g,'')});var ni=-1,qi=-1,ai=-1,li=-1,ci=-1,pi=-1;hd.forEach(function(h,i){if(ni===-1&&/^(instrument|symbol|stock|scrip|name)/.test(h))ni=i;if(qi===-1&&/^(qty|quantity)/.test(h))qi=i;if(ai===-1&&/^(avg|average)/.test(h))ai=i;if(li===-1&&(/^(ltp|last)/.test(h)||/closing\s*price/.test(h)||/^close/.test(h)))li=i;if(ci===-1&&/^(cur|current|value|market|present)/.test(h))ci=i;if(pi===-1&&/^(p&l|pnl|profit|p\/l|unreali)/.test(h))pi=i});if(ni===-1)return[];var r=[];for(var i=hi+1;i<l.length;i++){var c=parseCSVLine(l[i]);if(c.length<=ni)continue;var nm=c[ni].replace(/['"]/g,'').trim();if(!nm||/^(total|grand|summary)/i.test(nm))continue;var qt=qi>=0?parseNum(c[qi]):0,av=ai>=0?parseNum(c[ai]):0,lt=li>=0?parseNum(c[li]):0,cv=ci>=0?parseNum(c[ci]):0,pn=pi>=0?parseNum(c[pi]):0;if(!cv&&lt&&qt)cv=lt*qt;if(!cv&&av&&qt)cv=av*qt;var inv=av&&qt?av*qt:(cv-pn);if(cv<=0&&inv<=0)continue;r.push({name:nm,qty:qt,avgCost:av,ltp:lt,currentVal:cv||inv,investedAmt:inv>0?inv:0,pnl:pn})}return r}

// EMI Calculator
function calcEMI(){var p=parseFloat(S.emiForm.principal),r=parseFloat(S.emiForm.rate),n=parseInt(S.emiForm.tenure);if(!p||!r||!n||p<=0||r<=0||n<=0)return;var mr=r/(12*100);var emi=p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);var totalPayment=emi*n;var totalInterest=totalPayment-p;var schedule=[],bal=p;for(var i=1;i<=n;i++){var intPart=bal*mr;var prinPart=emi-intPart;bal-=prinPart;if(bal<0)bal=0;schedule.push({month:i,principal:Math.round(prinPart),interest:Math.round(intPart),balance:Math.round(bal)})}S.emiForm.emiResult={emi:Math.round(emi),principal:p,totalInterest:Math.round(totalInterest),totalPayment:Math.round(totalPayment),schedule:schedule};render()}

function buildHomeResults(q){var h='';var allExp=S.expenses.slice();if(q){var hq=q.toLowerCase();allExp=allExp.filter(function(e){return(e.note||'').toLowerCase().indexOf(hq)>=0||(e.desc||'').toLowerCase().indexOf(hq)>=0||((CM[e.category]||{}).label||'').toLowerCase().indexOf(hq)>=0||(e.source||'').toLowerCase().indexOf(hq)>=0||String(e.amount).indexOf(hq)>=0||e.date.indexOf(hq)>=0||(e.expType||'').indexOf(hq)>=0||(e.payMethod||'').indexOf(hq)>=0})}var gr={};allExp.forEach(function(e){(gr[e.date]=gr[e.date]||[]).push(e)});var days=Object.entries(gr).sort(function(a,b){return b[0].localeCompare(a[0])});if(q){var searchTotal=allExp.reduce(function(s,e){return s+e.amount},0);h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:6px 10px;background:var(--card);border-radius:8px;border:1px solid var(--bdr)"><span style="font-size:11px;color:var(--t2)">'+allExp.length+' result'+(allExp.length!==1?'s':'')+' for "<b style="color:var(--text)">'+esc(q)+'</b>"</span><span style="font-size:12px;font-weight:800;color:var(--acc)">'+fmt(searchTotal)+'</span></div>'}if(!days.length){h+='<div class="empty"><div class="emicon">'+(q?'🔍':'📝')+'</div><div class="emtitle">'+(q?'No matching expenses':'No expenses yet')+'</div>'+(q?'<div class="emsub">Try a different keyword</div>':'')+'</div>'}else{days.forEach(function(entry){var date=entry[0],items=entry[1];items.sort(function(a,b){return b.ts-a.ts});var tot=items.reduce(function(s,i){return s+i.amount},0);var bc={};items.forEach(function(i){bc[i.category]=(bc[i.category]||0)+i.amount});var cats=Object.entries(bc).sort(function(a,b){return b[1]-a[1]});h+='<div class="dc"><div class="dh"><span class="dd">'+nD(date)+'</span><span class="dt">'+fmt2(tot)+'</span></div><div class="catbar">'+cats.map(function(c){return'<div style="flex:'+c[1]/tot+';background:'+(CM[c[0]]?CM[c[0]].color:'#ccc')+'"></div>'}).join('')+'</div><div class="chips">'+cats.map(function(c){var cat=CM[c[0]];return cat?'<div class="chip"><span class="cdot" style="background:'+cat.color+'"></span><span class="cname">'+cat.label+'</span><span class="camt">'+fmt2(c[1])+'</span></div>':''}).join('')+'</div><div class="ilist">';items.forEach(function(it){var c=CM[it.category]||CM['other'],pm=it.payMethod||'bank',et=it.expType||'personal';h+='<div class="irow" style="'+(et==='split'?'background:rgba(6,182,212,.04);border-left:3px solid var(--cyan);border-radius:6px;padding-left:5px;margin-left:-3px':'')+'"><div class="iicon" style="background:'+c.color+'15">'+c.icon+'</div><div class="iinfo"><div class="ititle">'+esc(it.note||c.label)+(it.source?'<span class="isrc">'+esc(it.source)+'</span>':'')+(pm!=='bank'?'<span class="pbadge '+(pm==='cc'?'cc':'cash')+'">'+(pm==='cc'?'CC':'Cash')+'</span>':'')+(et==='split'?'<span class="etbadge split">Split</span>':'')+((it.spentBy||'self')==='wife'?'<span style="font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:3px;background:rgba(236,72,153,.1);color:#ec4899">Wife</span>':'')+(it.time?'<span class="itime">'+fT(it.time)+'</span>':'')+'</div><div class="isub">'+c.label+(it.subCat?' · <span style="color:var(--acc)">'+esc(it.subCat)+'</span>':'')+'</div>'+(it.desc?'<div class="idesc">📝 '+esc(it.desc)+'</div>':'')+'</div><div class="iamt">'+fmt2(it.amount)+'</div><div class="iacts"><button class="ibtn" style="color:var(--t3);font-size:13px" onclick="openExpEdit(\''+it.id+'\')">✏️</button><button class="ibtn" style="color:#cbd5e1;font-size:16px" onclick="askDel(\''+it.id+'\',\'exp\')">×</button></div></div>'});h+='</div></div>'})}return h}

// Split Expense Share
function shareSplitText(){var sr=getSplitRange();var splitExps=S.expenses.filter(function(e){return(e.expType||'personal')==='split'&&e.date>=sr.from&&e.date<=sr.to}).sort(function(a,b){return a.date.localeCompare(b.date)});var total=splitExps.reduce(function(s,e){return s+e.amount},0);var txt='📊 *Split Expenses*\n📅 '+sr.from+' to '+sr.to+'\n💸 Total: '+fmt(total)+'\n\n';splitExps.forEach(function(e){var c=CM[e.category]||{label:'Other',icon:'📌'};txt+=nD(e.date)+' | '+c.icon+' '+(e.note||c.label)+(e.subCat?' ('+e.subCat+')':'')+' | '+fmt2(e.amount)+(e.desc?' | '+e.desc:'')+'\n'});txt+='\n— ExpenseTracker v3.0';if(navigator.share){navigator.share({title:'Split Expenses',text:txt}).catch(function(){})}else{navigator.clipboard.writeText(txt).then(function(){alert('Copied to clipboard!')}).catch(function(){prompt('Copy this:',txt)})}}
function shareSplitExcel(){if(typeof XLSX==='undefined'){alert('SheetJS not loaded');return}var sr=getSplitRange();var splitExps=S.expenses.filter(function(e){return(e.expType||'personal')==='split'&&e.date>=sr.from&&e.date<=sr.to}).sort(function(a,b){return a.date.localeCompare(b.date)});var rows=splitExps.map(function(e){var c=CM[e.category]||{label:'Other'};return{Date:e.date,Time:e.time||'',Item:e.note||c.label,Category:c.label,'Sub-Category':e.subCat||'',Amount:e.amount,Payment:e.payMethod||'bank',Source:e.source||'',Description:e.desc||''}});var wb=XLSX.utils.book_new();var ws=XLSX.utils.json_to_sheet(rows);XLSX.utils.book_append_sheet(wb,ws,'Split Expenses');XLSX.writeFile(wb,'SplitExpenses_'+toD(new Date())+'.xlsx')}

// ═══ RECEIVE MONEY — Auto-Route ═══
function openReceive(){setState({showReceive:true,recvForm:{amount:'',type:'salary',source:'',person:'',assetId:'',date:toD(new Date()),time:nT(),desc:''}})}
function submitReceive(){var rf=S.recvForm,v=parseFloat(rf.amount);if(!v||v<=0)return;var routes={salary:'income',interest:'income',gift:'income',freelance:'credit',business:'credit',borrowed:'loan',liquidation:'asset',refund:'credit',other:'credit'};var route=routes[rf.type]||'credit';var labels={salary:'Salary',freelance:'Freelance',business:'Business Income',borrowed:'Borrowed',liquidation:'Asset Liquidation',refund:'Refund',gift:'Gift',interest:'Interest/Dividend',other:'Other'};var label=labels[rf.type]||'Credit';
if(route==='income'){S.income.unshift({id:uid(),amount:v,source:rf.source.trim()||label,date:rf.date,time:rf.time,ts:Date.now(),desc:rf.desc.trim()});svIn(S.income)}
else if(route==='credit'){S.credits.unshift({id:uid(),amount:v,type:rf.type,source:rf.source.trim()||label,date:rf.date,time:rf.time,ts:Date.now(),desc:rf.desc.trim()});svCr(S.credits)}
else if(route==='loan'){if(!rf.person.trim()){alert('Enter lender name');return}S.loans.unshift({id:uid(),amount:v,person:rf.person.trim(),type:'taken',date:rf.date,time:rf.time,ts:Date.now(),source:'',desc:rf.desc.trim()||label,settled:false,interestRate:'',tenure:''});svLn(S.loans);S.credits.unshift({id:uid(),amount:v,type:'borrowed',source:'Borrowed: '+rf.person.trim(),date:rf.date,time:rf.time,ts:Date.now(),desc:rf.desc.trim()||label});svCr(S.credits)}
else if(route==='asset'){if(!rf.assetId){alert('Select an asset to liquidate');return}var asset=S.assets.find(function(a){return a.id===rf.assetId});if(asset){var aName=asset.name;asset.currentVal=Math.max(0,asset.currentVal-v);asset.ts=Date.now();if(asset.currentVal<=0){S.assets=S.assets.filter(function(a){return a.id!==rf.assetId})}svAs(S.assets);S.credits.unshift({id:uid(),amount:v,type:'liquidation',source:'Asset: '+aName,date:rf.date,time:rf.time,ts:Date.now(),desc:rf.desc.trim()});svCr(S.credits)}}
// ALL received money adds to opening balance
S.openingBals['base']=(S.openingBals['base']||0)+v;svOB(S.openingBals);
closeModal();alert('✅ '+fmt(v)+' → '+(route==='loan'?'Loans + Credits':route==='asset'?'Credits + Asset reduced':route==='credit'?'Credits':'Income')+': '+label+'\n📊 Opening Balance updated')}

// Theme toggle
function toggleTheme(){S.isDark=!S.isDark;sLS('ET_THEME',S.isDark);render()}
// Budget
function setBudgetPrompt(){var v=prompt('Set monthly budget (₹):',S.monthlyBudget||'');if(v===null)return;S.monthlyBudget=parseFloat(v)||0;sLS('ET_BUDGET',S.monthlyBudget);render()}
function saveBudget(){var v=parseFloat(document.getElementById('budgetIn')?document.getElementById('budgetIn').value:0);S.monthlyBudget=v||0;sLS('ET_BUDGET',S.monthlyBudget);render()}
// Share
function openShareModal(){setState({showShare:true})}
function shareWhatsApp(){var shareMR=mRange(0);var shareExp=S.expenses.filter(function(e){return e.date>=shareMR.from&&e.date<=shareMR.to});var shareTot=shareExp.reduce(function(s,e){return s+e.amount},0);var shareInc=S.income.filter(function(i){return i.date>=shareMR.from&&i.date<=shareMR.to}).reduce(function(s,i){return s+i.amount},0);var txt='📊 *Expense Summary*\n📅 '+new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'})+'\n\n💸 Total Spent: '+fmt(shareTot)+'\n💰 Income: '+fmt(shareInc)+'\n📊 Net: '+(shareInc-shareTot>=0?'+':'')+fmt(shareInc-shareTot);window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank')}
function copyShare(){var el=document.querySelector('.share-text');if(el){var txt=el.innerText;navigator.clipboard.writeText(txt).then(function(){alert('Copied!')}).catch(function(){})}}
// PDF Export
function sharePDF(){try{var jsPDF=window.jspdf.jsPDF;var doc=new jsPDF();var mr=mRange(0);var mExp=S.expenses.filter(function(e){return e.date>=mr.from&&e.date<=mr.to});doc.setFontSize(18);doc.text('Expense Statement',14,20);doc.setFontSize(10);doc.text(new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'}),14,28);var rows=mExp.sort(function(a,b){return a.date.localeCompare(b.date)}).map(function(e){var c=CM[e.category]||{label:'Other'};return[nD(e.date),e.note||c.label,c.label,e.payMethod||'bank',fmt2(e.amount)]});doc.autoTable({head:[['Date','Note','Category','Payment','Amount']],body:rows,startY:34,styles:{fontSize:8},headStyles:{fillColor:[129,140,248]}});var tot=mExp.reduce(function(s,e){return s+e.amount},0);doc.setFontSize(11);doc.text('Total: '+fmt(tot),14,doc.lastAutoTable.finalY+10);doc.save('ExpenseStatement_'+toD(new Date())+'.pdf');closeModal()}catch(e){alert('PDF export error: '+e.message)}}
// QR Scanner
var qrScanner=null;
function startQR(){if(typeof Html5Qrcode==='undefined'){alert('QR scanner not loaded');return}setTimeout(function(){try{qrScanner=new Html5Qrcode('qr-reader');qrScanner.start({facingMode:'environment'},{fps:10,qrbox:250},function(text){stopQR();if(/upi:\/\//i.test(text)){var amMatch=text.match(/am=(\d+\.?\d*)/i);var pnMatch=text.match(/pn=([^&]+)/i);if(amMatch||pnMatch){S.showQR=false;S.showExpAdd=true;S.expAddMode='manual';S.expForm.amount=amMatch?amMatch[1]:'';S.expForm.note=pnMatch?decodeURIComponent(pnMatch[1]):'UPI Payment';S.expForm.payMethod='bank';render()}}else{alert('Not a UPI QR code')}}).catch(function(e){console.log('QR err',e)})}catch(e){alert('Camera error: '+e.message)}},500)}
function stopQR(){if(qrScanner){try{qrScanner.stop().catch(function(){})}catch(e){}qrScanner=null}}

// Telegram token
function saveTgToken(){var t=document.getElementById('tgToken')?document.getElementById('tgToken').value.trim():'';if(t)localStorage.setItem('ET_TG_TOKEN',t);else localStorage.removeItem('ET_TG_TOKEN');alert(t?'Token saved!':'Token cleared')}
// ═══ v3.0 FEATURES ═══
// PIN Lock
function pinKey(k){if(k==='del'||k==='⌫'){S.pinInput=S.pinInput.slice(0,-1);render();return}S.pinInput+=k;if(S.pinInput.length===4){var stored=localStorage.getItem('ET_PIN');if(S.pinSetMode){localStorage.setItem('ET_PIN',S.pinInput);S.pinSetMode=false;S.pinLocked=false;S.pinInput='';alert('PIN set!');render()}else if(S.pinInput===stored){S.pinLocked=false;S.pinInput='';render()}else{S.pinInput='';render();setTimeout(function(){alert('Wrong PIN')},100)}}else{render()}}
function bioUnlock(){if(!window.PublicKeyCredential){alert('Biometric not supported');return}if(navigator.credentials&&navigator.credentials.get){navigator.credentials.get({publicKey:{challenge:new Uint8Array(32),timeout:60000,userVerification:'required',rpId:location.hostname,allowCredentials:[]}}).then(function(){S.pinLocked=false;S.pinInput='';render()}).catch(function(){alert('Biometric failed. Use PIN.')})}}
function togglePIN(){var current=localStorage.getItem('ET_PIN');if(current){if(confirm('Remove PIN lock?')){localStorage.removeItem('ET_PIN');S.pinLocked=false;render()}}else{S.pinLocked=true;S.pinSetMode=true;S.pinInput='';render()}}
// QR Pairing
function showPairQRModal(){var u=gU();if(!u){alert('Set up Cloud Sync URL first in Settings');return}setState({showPairQR:true})}

var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;render()});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;render()})}}
function dismissPWA(){sessionStorage.setItem('pwa_dismissed','1');render()}
if('serviceWorker' in navigator&&location.protocol==='https:'){var swCode='var C="et-v27";self.addEventListener("install",function(e){e.waitUntil(caches.open(C).then(function(c){return c.add(location.href)}));self.skipWaiting()});self.addEventListener("activate",function(e){e.waitUntil(clients.claim())});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(res){if(res.ok){var cl=res.clone();caches.open(C).then(function(c){c.put(e.request,cl)})}return res}).catch(function(){return caches.match(e.request)})}))})';var swBlob=new Blob([swCode],{type:"application/javascript"});navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(function(){})}

window.addEventListener('scroll',function(){sessionStorage.setItem('sc',window.scrollY)},{passive:true});
render();
// One-time silent sync on load — no render during sync
setTimeout(function(){var u=gU();if(u&&!S._synced){S._synced=true;cloudRead().then(function(d){if(d&&d.success){var changed=false;if(d.autoExpenses&&d.autoExpenses.length){var before=S.expenses.length;S.expenses=mergeById(S.expenses,d.autoExpenses);if(S.expenses.length>before){svE(S.expenses);changed=true}}if(d.data&&d.data.expenses){S.expenses=mergeById(S.expenses,d.data.expenses);svE(S.expenses);changed=true}if(changed){S.syncSt='ok';S.lastSync=new Date().toISOString();localStorage.setItem(SYNC_KEY,S.lastSync);render()}}}).catch(function(){})}},3000);
// Start QR if modal is open
if(S.showQR)setTimeout(startQR,600);
var scr=parseInt(sessionStorage.getItem('sc'))||0;if(scr)window.scrollTo(0,scr);
if(gU())setTimeout(cloudSync,1500);
